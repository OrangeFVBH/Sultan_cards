<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица лидеров - Дурак 36 карт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a2f23 0%, #041f19 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        
        .leaderboard-box {
            background: rgba(5, 40, 31, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 255, 150, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
            min-width: 500px;
        }
        
        h1 {
            color: #00ff96;
            margin-bottom: 10px;
            font-size: 32px;
            text-align: center;
        }
        
        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .leaderboard-table th,
        .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .leaderboard-table th {
            color: #00ff96;
            font-weight: bold;
            font-size: 16px;
        }
        
        .leaderboard-table td {
            color: white;
        }
        
        .rank-1 {
            color: #ffd700;
            font-weight: bold;
        }
        
        .rank-2 {
            color: #c0c0c0;
            font-weight: bold;
        }
        
        .rank-3 {
            color: #cd7f32;
            font-weight: bold;
        }
        
        .back-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ff96 0%, #00cc7a 100%);
            color: #05281f;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 150, 0.3);
        }
        
        .loading {
            text-align: center;
            color: #00ff96;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="leaderboard-box">
        <h1>🏆 ТАБЛИЦА ЛИДЕРОВ</h1>
        <div class="subtitle">Лучшие игроки всех времен</div>
        
        <div id="leaderboardContent">
            <div class="loading">Загрузка...</div>
        </div>
        
        <button class="back-btn" onclick="goBack()">← Назад в лобби</button>
    </div>
    
    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/auth/leaderboard');
                const players = await response.json();
                
                if (players.length === 0) {
                    document.getElementById('leaderboardContent').innerHTML = 
                        '<div class="loading">Нет данных для отображения</div>';
                    return;
                }
                
                const html = `
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Игрок</th>
                                <th>Победы</th>
                                <th>Поражения</th>
                                <th>Всего игр</th>
                                <th>Win Rate</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${players.map((player, index) => {
                                const winRate = player.gamesPlayed > 0 
                                    ? ((player.wins / player.gamesPlayed) * 100).toFixed(1) 
                                    : 0;
                                let rankClass = '';
                                if (index === 0) rankClass = 'rank-1';
                                if (index === 1) rankClass = 'rank-2';
                                if (index === 2) rankClass = 'rank-3';
                                
                                return `
                                    <tr>
                                        <td class="${rankClass}">${index + 1}</td>
                                        <td>${player.username}</td>
                                        <td style="color: #4caf50">${player.wins}</td>
                                        <td style="color: #f44336">${player.losses}</td>
                                        <td>${player.gamesPlayed}</td>
                                        <td style="color: #ffd700">${winRate}%</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
                
                document.getElementById('leaderboardContent').innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки лидерборда:', error);
                document.getElementById('leaderboardContent').innerHTML = 
                    '<div class="loading">Ошибка загрузки данных</div>';
            }
        }
        
        function goBack() {
            window.location.href = '/lobby.html';
        }
        
        loadLeaderboard();
    </script>
</body>
</html>
