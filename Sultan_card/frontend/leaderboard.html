<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица лидеров - Sultan Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 20%, #2a1508 0%, #0a0502 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', 'Playfair Display', sans-serif;
            padding: 40px;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.06) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .leaderboard-box {
            background: rgba(10, 6, 4, 0.94);
            backdrop-filter: blur(12px);
            padding: 45px 50px;
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), 0 0 0 2px #d4af37, 0 0 0 5px #5c3e0e;
            border: none;
            min-width: 800px;
            width: auto;
            text-align: center;
        }
        
        h1 {
            color: #d4af37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            font-family: 'Oswald', sans-serif;
            letter-spacing: 3px;
            font-size: 38px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #c9af7b;
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
        }
        
        .leaderboard-table th {
            color: #d4af37;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1.5px;
            font-size: 16px;
            padding: 16px 12px;
            border-bottom: 2px solid #d4af37;
        }
        
        .leaderboard-table td {
            color: #faf4e0;
            padding: 14px 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 16px;
        }
        
        .rank-1 { 
            color: #ffd700; 
            font-weight: bold;
            text-shadow: 0 0 5px #ffd700;
            font-size: 20px;
        }
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 18px; }
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 18px; }
        
        .back-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1.5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }
        
        .loading {
            color: #d4af37;
            padding: 40px;
            font-size: 18px;
            letter-spacing: 1px;
        }
        
        @media (max-width: 900px) {
            .leaderboard-box { min-width: 90%; padding: 30px 20px; }
            .leaderboard-table th, .leaderboard-table td { font-size: 12px; padding: 10px 6px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="leaderboard-box">
        <h1>🏆 ТАБЛИЦА ЛИДЕРОВ</h1>
        <div class="subtitle">Лучшие игроки Sultan Casino</div>
        
        <div id="leaderboardContent">
            <div class="loading">Загрузка...</div>
        </div>
        
        <button class="back-btn" onclick="goBack()">← НАЗАД В ЛОББИ</button>
    </div>
    
    <script>
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/auth/leaderboard');
                const players = await response.json();
                if (players.length === 0) {
                    document.getElementById('leaderboardContent').innerHTML = 
                        '<div class="loading">✨ Нет данных для отображения ✨</div>';
                    return;
                }
                const html = `
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ИГРОК</th>
                                <th>🏆 ПОБЕДЫ</th>
                                <th>💔 ПОРАЖЕНИЯ</th>
                                <th>📊 ВСЕГО ИГР</th>
                                <th>⭐ WIN RATE</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${players.map((player, index) => {
                                const winRate = player.gamesPlayed > 0 
                                    ? ((player.wins / player.gamesPlayed) * 100).toFixed(1) 
                                    : 0;
                                let rankClass = '';
                                let rankDisplay = '';
                                if (index === 0) { rankClass = 'rank-1'; rankDisplay = '🥇'; }
                                if (index === 1) { rankClass = 'rank-2'; rankDisplay = '🥈'; }
                                if (index === 2) { rankClass = 'rank-3'; rankDisplay = '🥉'; }
                                return `
                                    <tr>
                                        <td class="${rankClass}">${rankDisplay || (index + 1)}</td>
                                        <td style="font-weight:500;">${escapeHtml(player.username)}</td>
                                        <td style="color: #4caf50; font-weight:bold;">${player.wins}</td>
                                        <td style="color: #ff8888;">${player.losses}</td>
                                        <td>${player.gamesPlayed}</td>
                                        <td style="color: #d4af37; font-weight:bold;">${winRate}%</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('leaderboardContent').innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки лидерборда:', error);
                document.getElementById('leaderboardContent').innerHTML = 
                    '<div class="loading">❌ Ошибка загрузки данных</div>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function goBack() {
            window.location.href = '/lobby.html';
        }
        
        loadLeaderboard();
    </script>
</body>
</html>
