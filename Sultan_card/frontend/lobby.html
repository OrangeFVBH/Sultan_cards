<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лобби - Sultan Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 20%, #2a1508 0%, #0a0502 100%);
            min-height: 100vh;
            font-family: 'Oswald', 'Playfair Display', sans-serif;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.06) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 18px 30px;
            background: rgba(10, 6, 4, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid #d4af37;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.3);
        }
        
        .logo h1 {
            color: #d4af37;
            font-size: 28px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }
        
        .username {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stats {
            color: #c9af7b;
            font-size: 13px;
        }
        
        .logout-btn {
            background: rgba(139, 0, 0, 0.3);
            color: #ffaa88;
            border: 1px solid #8b0000;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #8b0000;
            color: white;
            border-color: #d4af37;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
        }
        
        .lobbies-section, .current-lobby-section {
            background: rgba(10, 6, 4, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 22px;
            border: 2px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .section-header h2 {
            color: #d4af37;
            letter-spacing: 1px;
            font-size: 22px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #searchLobbyInput {
            padding: 10px 18px;
            width: 200px;
            background: rgba(30, 20, 12, 0.9);
            border: 1.5px solid #997a00;
            border-radius: 40px;
            color: #faf4e0;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
        }
        
        #searchLobbyInput:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .create-lobby-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .create-lobby-btn:hover, .leaderboard-btn:hover {
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }
        
        .lobbies-list {
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .lobby-item {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        
        .lobby-item:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.12);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
        }
        
        .lobby-info h3 {
            color: #d4af37;
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .lobby-info p {
            color: #aa9977;
            font-size: 12px;
        }
        
        .join-lobby-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .join-lobby-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
            transform: scale(1.02);
        }
        
        .join-lobby-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .leaderboard-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .current-lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.4);
        }
        
        .current-lobby-header h2 {
            color: #d4af37;
            font-size: 20px;
        }
        
        .lobby-code {
            background: rgba(212, 175, 55, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
            color: #d4af37;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .players-list {
            margin: 20px 0;
        }
        
        .player-item {
            background: rgba(212, 175, 55, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-name {
            color: #faf4e0;
            font-size: 16px;
        }
        
        .player-role {
            color: #d4af37;
            margin-left: 10px;
            font-size: 12px;
        }
        
        .kick-btn {
            background: rgba(139, 0, 0, 0.3);
            color: #ffaa88;
            border: 1px solid #8b0000;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .kick-btn:hover {
            background: #8b0000;
            color: white;
        }
        
        .lobby-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .start-game-btn {
            flex: 1;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .start-game-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
            box-shadow: 0 0 18px rgba(212, 175, 55, 0.5);
        }
        
        .start-game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .leave-lobby-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            color: #faf4e0;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .leave-lobby-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
        }
        
        .no-lobby {
            text-align: center;
            color: #aa9977;
            padding: 50px 20px;
        }
        
        .empty-lobbies {
            text-align: center;
            color: #aa9977;
            padding: 40px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a0f08;
            padding: 32px;
            border-radius: 28px;
            min-width: 380px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }
        
        .modal-content h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: rgba(30, 20, 12, 0.9);
            border: 1.5px solid #997a00;
            border-radius: 40px;
            color: #faf4e0;
            font-size: 15px;
        }
        
        .modal-content input:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .modal-content label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
            color: #faf4e0;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        
        .confirm-btn {
            flex: 1;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .cancel-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: #faf4e0;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0f08;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎴 SULTAN CASINO</h1>
            </div>
            <div class="user-info">
                <div>
                    <div class="username" id="username">Загрузка...</div>
                    <div class="stats" id="stats"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="lobbies-section">
                <div class="section-header">
                    <h2>🏠 Публичные лобби</h2>
                    <div class="search-box">
                        <input type="text" id="searchLobbyInput" placeholder="🔍 Поиск по названию...">
                        <button class="create-lobby-btn" onclick="showCreateLobbyModal()">+ Создать</button>
                    </div>
                </div>
                <div class="lobbies-list" id="lobbiesList">
                    <div class="empty-lobbies">Загрузка лобби...</div>
                </div>
                <button class="leaderboard-btn" onclick="showLeaderboard()">🏆 ТАБЛИЦА ЛИДЕРОВ</button>
            </div>
            
            <div class="current-lobby-section" id="currentLobbySection">
                <div class="current-lobby-header">
                    <h2>🎮 Ваше лобби</h2>
                    <div class="lobby-code" id="lobbyCode">—</div>
                </div>
                <div id="currentLobbyContent">
                    <div class="no-lobby">
                        Вы не в лобби<br>
                        Создайте или присоединитесь к игре
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="createLobbyModal">
        <div class="modal-content">
            <h3>Создание лобби</h3>
            <input type="text" id="lobbyName" placeholder="Название лобби" maxlength="30">
            <label>
                <input type="checkbox" id="isPrivateCheckbox"> Приватное лобби
            </label>
            <input type="password" id="lobbyPassword" placeholder="Пароль (для приватного)" style="display: none;">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="createLobby()">Создать</button>
                <button class="cancel-btn" onclick="closeCreateLobbyModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="joinPrivateModal">
        <div class="modal-content">
            <h3>Вход в приватное лобби</h3>
            <input type="password" id="privateLobbyPassword" placeholder="Введите пароль">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="joinPrivateLobby()">Войти</button>
                <button class="cancel-btn" onclick="closeJoinPrivateModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentLobby = null;
        let pendingLobbyId = null;
        let allLobbies = [];
        let refreshInterval = null;
        
        async function init() {
            await loadUserData();
            connectSocket();
            refreshInterval = setInterval(refreshLobbies, 5000);
            window.addEventListener('beforeunload', () => {
                if (refreshInterval) clearInterval(refreshInterval);
                if (socket && currentLobby) {
                    socket.emit('leaveLobby', {});
                }
            });
            const searchInput = document.getElementById('searchLobbyInput');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    renderLobbiesList(allLobbies);
                });
            }
        }
        
        async function loadUserData() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/';
                    return;
                }
                currentUser = data.username;
                document.getElementById('username').textContent = currentUser;
                document.getElementById('stats').textContent = `🏆 Побед: ${data.stats.wins} | 💔 Поражений: ${data.stats.losses}`;
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                window.location.href = '/';
            }
        }
        
        function connectSocket() {
            socket = io();
            socket.on('connect', () => { console.log('✅ Подключен'); });
            socket.on('lobbiesList', (lobbies) => {
                allLobbies = lobbies || [];
                renderLobbiesList(allLobbies);
            });
            socket.on('lobbyLeft', () => {
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            socket.on('lobbyUpdate', (lobby) => {
                if (currentUser && lobby.players) {
                    const isStillInLobby = lobby.players.some(p => p.username === currentUser);
                    if (!isStillInLobby && currentLobby) {
                        currentLobby = null;
                        renderCurrentLobby(null);
                        refreshLobbies();
                        return;
                    }
                }
                currentLobby = lobby;
                renderCurrentLobby(lobby);
            });
            socket.on('gameStarted', (data) => {
                console.log('🎮 Игра началась! Перенаправление на game.html...', data);
                
                // Сохраняем данные в sessionStorage
                sessionStorage.setItem('playerName', currentUser);
                sessionStorage.setItem('currentLobbyId', data.lobbyId);
                
                // Очищаем интервал обновления лобби
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
                
                // Отключаем текущий сокет от комнаты лобби (но не отключаем сам сокет)
                if (socket) {
                    socket.off('lobbiesList');
                    socket.off('lobbyUpdate');
                    socket.off('lobbyLeft');
                }
                
                // Перенаправляем на страницу игры
                window.location.href = `/game.html?lobbyId=${data.lobbyId}`;
            });
            socket.on('kickedFromLobby', (data) => {
                alert(data.message);
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            socket.on('redirectToLobbyList', () => {
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            socket.on('error', (error) => { alert(error); });
            refreshLobbies();
        }
        
        function renderLobbiesList(lobbies) {
            const searchTerm = document.getElementById('searchLobbyInput')?.value.toLowerCase() || '';
            let filteredLobbies = lobbies;
            if (searchTerm) { filteredLobbies = lobbies.filter(l => l.name.toLowerCase().includes(searchTerm)); }
            const container = document.getElementById('lobbiesList');
            if (!filteredLobbies || filteredLobbies.length === 0) {
                container.innerHTML = '<div class="empty-lobbies">✨ Нет доступных лобби ✨</div>';
                return;
            }
            container.innerHTML = filteredLobbies.map(lobby => `
                <div class="lobby-item">
                    <div class="lobby-info">
                        <h3>${escapeHtml(lobby.name)}</h3>
                        <p>👑 ${escapeHtml(lobby.creator)} | 👥 ${lobby.playersCount}/${lobby.maxPlayers}${lobby.hasPassword ? ' | 🔒' : ''}</p>
                    </div>
                    ${!currentLobby ? 
                        `<button class="join-lobby-btn" onclick="joinLobby('${lobby.lobbyId}')">Войти</button>` : 
                        `<button class="join-lobby-btn" disabled style="opacity:0.5;">В игре</button>`
                    }
                </div>
            `).join('');
        }
        
        function renderCurrentLobby(lobby) {
            const container = document.getElementById('currentLobbyContent');
            if (!lobby || !lobby.players || lobby.players.length === 0) {
                container.innerHTML = `<div class="no-lobby">✨ Вы не в лобби ✨<br>Создайте или присоединитесь к игре</div>`;
                document.getElementById('lobbyCode').textContent = '—';
                return;
            }
            document.getElementById('lobbyCode').textContent = lobby.lobbyId;
            const isCreator = lobby.creator === currentUser;
            const canStart = lobby.playersCount === 3 && isCreator;
            container.innerHTML = `
                <div class="players-list">
                    ${lobby.players.map(player => `
                        <div class="player-item">
                            <div>
                                <span class="player-name">${escapeHtml(player.username)}</span>
                                ${player.username === lobby.creator ? '<span class="player-role">(Создатель)</span>' : ''}
                            </div>
                            ${isCreator && player.username !== currentUser ? `<button class="kick-btn" onclick="kickPlayer('${escapeHtml(player.username)}')">X</button>` : ''}
                        </div>
                    `).join('')}
                </div>
                <div class="lobby-actions">
                    ${isCreator ? `<button class="start-game-btn" onclick="startGame()" ${!canStart ? 'disabled' : ''}>▶ НАЧАТЬ</button>` : ''}
                    <button class="leave-lobby-btn" onclick="leaveLobby()">🚪 Выйти</button>
                </div>
            `;
        }
        
        function refreshLobbies() { if (socket && socket.connected) socket.emit('getLobbies'); }
        function showCreateLobbyModal() { document.getElementById('createLobbyModal').classList.add('active'); }
        function closeCreateLobbyModal() { document.getElementById('createLobbyModal').classList.remove('active'); }
        function closeJoinPrivateModal() { document.getElementById('joinPrivateModal').classList.remove('active'); }
        
        function createLobby() {
            const lobbyName = document.getElementById('lobbyName').value.trim();
            if (!lobbyName) { alert('Введите название лобби'); return; }
            const isPrivate = document.getElementById('isPrivateCheckbox').checked;
            const password = document.getElementById('lobbyPassword').value;
            socket.emit('createLobby', { username: currentUser, isPrivate, password, lobbyName }, (res) => {
                if (res.success) { currentLobby = res.lobby; renderCurrentLobby(currentLobby); closeCreateLobbyModal(); }
                else alert(res.error);
            });
        }
        
        function joinLobby(id) {
            pendingLobbyId = id;
            socket.emit('joinLobby', { lobbyId: id, username: currentUser }, (res) => {
                if (res.success) { currentLobby = res.lobby; renderCurrentLobby(currentLobby); }
                else if (res.error === 'Неверный пароль') { document.getElementById('joinPrivateModal').classList.add('active'); }
                else alert(res.error);
            });
        }
        
        function joinPrivateLobby() {
            const password = document.getElementById('privateLobbyPassword').value;
            socket.emit('joinLobby', { lobbyId: pendingLobbyId, username: currentUser, password }, (res) => {
                if (res.success) { currentLobby = res.lobby; renderCurrentLobby(currentLobby); closeJoinPrivateModal(); }
                else { alert(res.error); }
            });
        }
        
        function kickPlayer(usernameToKick) {
            if (confirm(`Выгнать ${usernameToKick} из лобби?`)) {
                socket.emit('kickPlayer', { lobbyId: currentLobby.lobbyId, usernameToKick });
            }
        }
        
        function leaveLobby() { if (confirm('Выйти из лобби?')) socket.emit('leaveLobby', {}, () => { currentLobby = null; renderCurrentLobby(null); }); }
        
        function startGame() {
            if (!socket || !currentLobby) return;
            if (currentLobby.creator !== currentUser) {
                alert('Только создатель может начать игру');
                return;
            }
            
            // Сохраняем lobbyId перед запуском
            sessionStorage.setItem('currentLobbyId', currentLobby.lobbyId);
            
            socket.emit('startGame', {}, (response) => {
                if (response && response.success) {
                    console.log('Игра запущена, ожидаем перехода...');
                    // Не делаем leaveLobby - сервер сам обработает
                } else if (response && response.error) {
                    alert('Ошибка запуска: ' + response.error);
                }
            });
        }
        
        function showLeaderboard() { window.location.href = '/leaderboard.html'; }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/'; }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        document.getElementById('isPrivateCheckbox').addEventListener('change', (e) => {
            document.getElementById('lobbyPassword').style.display = e.target.checked ? 'block' : 'none';
        });
        
        init();
    </script>
</body>
</html>
