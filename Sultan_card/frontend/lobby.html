<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лобби - СУЛТАН Дурак</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a2f23 0%, #041f19 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(5, 40, 31, 0.95);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .logo h1 {
            color: #00ff96;
            font-size: 28px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .username {
            color: #00ff96;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stats {
            color: #ffd700;
            font-size: 14px;
        }
        
        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #ff4444;
            color: white;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        
        .lobbies-section {
            background: rgba(5, 40, 31, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .section-header h2 {
            color: #00ff96;
            font-size: 24px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #searchLobbyInput {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #00ff96;
            background: #0f4a38;
            color: white;
            font-size: 14px;
            width: 200px;
        }
        
        #searchLobbyInput::placeholder {
            color: #888;
        }
        
        #searchLobbyInput:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 150, 0.3);
        }
        
        .create-lobby-btn {
            background: linear-gradient(135deg, #00ff96 0%, #00cc7a 100%);
            color: #05281f;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .create-lobby-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 150, 0.3);
        }
        
        .lobbies-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .lobby-item {
            background: rgba(0, 255, 150, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .lobby-item:hover {
            background: rgba(0, 255, 150, 0.2);
        }
        
        .lobby-info h3 {
            color: #00ff96;
            margin-bottom: 5px;
        }
        
        .lobby-info p {
            color: #ccc;
            font-size: 12px;
        }
        
        .join-lobby-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .join-lobby-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .join-lobby-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .empty-lobbies {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .current-lobby-section {
            background: rgba(5, 40, 31, 0.95);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .current-lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .current-lobby-header h2 {
            color: #00ff96;
            font-size: 20px;
        }
        
        .lobby-code {
            background: rgba(0, 255, 150, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            color: #00ff96;
        }
        
        .players-list {
            margin: 20px 0;
        }
        
        .player-item {
            background: rgba(0, 255, 150, 0.1);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-name {
            color: white;
            font-size: 16px;
        }
        
        .player-role {
            font-size: 12px;
            color: #ffd700;
            margin-left: 8px;
        }
        
        .kick-btn {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .kick-btn:hover {
            background: #ff4444;
            color: white;
        }
        
        .lobby-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .start-game-btn {
            flex: 1;
            background: linear-gradient(135deg, #ff9800 0%, #ff6600 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .start-game-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.3);
        }
        
        .start-game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .leave-lobby-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .leave-lobby-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .waiting-text {
            text-align: center;
            color: #ffd700;
            margin: 20px 0;
            font-size: 14px;
        }
        
        .no-lobby {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .leaderboard-btn {
            margin-top: 20px;
            width: 100%;
            background: linear-gradient(135deg, #ffd700 0%, #ff9800 100%);
            color: #05281f;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .leaderboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #0a2f23;
            padding: 30px;
            border-radius: 15px;
            min-width: 400px;
            border: 1px solid rgba(0, 255, 150, 0.3);
        }
        
        .modal-content h3 {
            color: #00ff96;
            margin-bottom: 20px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f4a38;
            border: 1px solid #00ff96;
            border-radius: 8px;
            color: white;
        }
        
        .modal-content label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            color: white;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .confirm-btn {
            background: #00ff96;
            color: #05281f;
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 150, 0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00ff96;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎴 СУЛТАН ДУРАК</h1>
            </div>
            <div class="user-info">
                <div>
                    <div class="username" id="username">Загрузка...</div>
                    <div class="stats" id="stats"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="lobbies-section">
                <div class="section-header">
                    <h2>🏠 Публичные лобби</h2>
                    <div class="search-box">
                        <input type="text" id="searchLobbyInput" placeholder="🔍 Поиск по названию...">
                        <button class="create-lobby-btn" onclick="showCreateLobbyModal()">+ Создать лобби</button>
                    </div>
                </div>
                <div class="lobbies-list" id="lobbiesList">
                    <div class="empty-lobbies">Загрузка лобби...</div>
                </div>
                <button class="leaderboard-btn" onclick="showLeaderboard()">🏆 Таблица лидеров</button>
            </div>
            
            <div class="current-lobby-section" id="currentLobbySection">
                <div class="current-lobby-header">
                    <h2>🎮 Ваше лобби</h2>
                    <div class="lobby-code" id="lobbyCode">—</div>
                </div>
                <div id="currentLobbyContent">
                    <div class="no-lobby">
                        Вы не в лобби<br>
                        Создайте или присоединитесь к игре
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="createLobbyModal">
        <div class="modal-content">
            <h3>Создание лобби</h3>
            <input type="text" id="lobbyName" placeholder="Название лобби (обязательно)" maxlength="30">
            <label>
                <input type="checkbox" id="isPrivateCheckbox"> Приватное лобби
            </label>
            <input type="password" id="lobbyPassword" placeholder="Пароль (для приватного)" style="display: none;">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="createLobby()">Создать</button>
                <button class="cancel-btn" onclick="closeCreateLobbyModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="joinPrivateModal">
        <div class="modal-content">
            <h3>Вход в приватное лобби</h3>
            <input type="password" id="privateLobbyPassword" placeholder="Введите пароль">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="joinPrivateLobby()">Войти</button>
                <button class="cancel-btn" onclick="closeJoinPrivateModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentLobby = null;
        let pendingLobbyId = null;
        let allLobbies = [];
        let refreshInterval = null;
        
        async function init() {
            await loadUserData();
            connectSocket();
            
            refreshInterval = setInterval(refreshLobbies, 5000);
            
            window.addEventListener('beforeunload', () => {
                if (refreshInterval) clearInterval(refreshInterval);
                if (socket && currentLobby) {
                    socket.emit('leaveLobby', {});
                }
            });
            
            const searchInput = document.getElementById('searchLobbyInput');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    renderLobbiesList(allLobbies);
                });
            }
        }
        
        async function loadUserData() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                
                if (!data.authenticated) {
                    window.location.href = '/';
                    return;
                }
                
                currentUser = data.username;
                document.getElementById('username').textContent = currentUser;
                document.getElementById('stats').textContent = `🏆 Побед: ${data.stats.wins} | 💔 Поражений: ${data.stats.losses}`;
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                window.location.href = '/';
            }
        }
        
        function connectSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('✅ Подключен к серверу');
            });
            
            socket.on('lobbiesList', (lobbies) => {
                allLobbies = lobbies || [];
                renderLobbiesList(allLobbies);
            });
            
            socket.on('lobbyLeft', () => {
                console.log('Получено уведомление о выходе из лобби');
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            
            socket.on('lobbyUpdate', (lobby) => {
                console.log('Обновление лобби:', lobby);
                if (currentUser && lobby.players) {
                    const isStillInLobby = lobby.players.some(p => p.username === currentUser);
                    if (!isStillInLobby && currentLobby) {
                        console.log('Игрок больше не в лобби, очищаем состояние');
                        currentLobby = null;
                        renderCurrentLobby(null);
                        refreshLobbies();
                        return;
                    }
                }
                currentLobby = lobby;
                renderCurrentLobby(lobby);
            });
            
            socket.on('gameStarted', (data) => {
                console.log('Игра начинается!', data);
                sessionStorage.setItem('playerName', currentUser);
                sessionStorage.setItem('currentLobbyId', data.lobbyId);
                setTimeout(() => {
                    window.location.href = `/game.html?lobbyId=${data.lobbyId}`;
                }, 500);
            });
            
            socket.on('kickedFromLobby', (data) => {
                alert(data.message);
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            
            socket.on('redirectToLobbyList', () => {
                currentLobby = null;
                renderCurrentLobby(null);
                refreshLobbies();
            });
            
            socket.on('error', (error) => {
                console.error('Ошибка:', error);
                alert(error);
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
            });
            
            refreshLobbies();
        }
        
        function renderLobbiesList(lobbies) {
            const searchTerm = document.getElementById('searchLobbyInput')?.value.toLowerCase() || '';
            
            let filteredLobbies = lobbies;
            if (searchTerm) {
                filteredLobbies = lobbies.filter(lobby => 
                    lobby.name.toLowerCase().includes(searchTerm)
                );
            }
            
            const container = document.getElementById('lobbiesList');
            
            if (!filteredLobbies || filteredLobbies.length === 0) {
                container.innerHTML = '<div class="empty-lobbies">Нет доступных лобби<br>Создайте свое!</div>';
                return;
            }
            
            container.innerHTML = filteredLobbies.map(lobby => `
                <div class="lobby-item">
                    <div class="lobby-info">
                        <h3>${escapeHtml(lobby.name)}</h3>
                        <p>👑 ${escapeHtml(lobby.creator)} | 👥 ${lobby.playersCount}/${lobby.maxPlayers}${lobby.hasPassword ? ' | 🔒 Приватное' : ''}</p>
                    </div>
                    ${!currentLobby ? 
                        `<button class="join-lobby-btn" onclick="joinLobby('${lobby.lobbyId}')">Присоединиться</button>` : 
                        '<button class="join-lobby-btn" disabled style="opacity:0.5; cursor:not-allowed;">Уже в лобби</button>'
                    }
                </div>
            `).join('');
        }
        
        function renderCurrentLobby(lobby) {
            const container = document.getElementById('currentLobbyContent');
            
            console.log('renderCurrentLobby вызван с lobby:', lobby);
            
            if (!lobby || !lobby.players || lobby.players.length === 0) {
                container.innerHTML = `
                    <div class="no-lobby">
                        Вы не в лобби<br>
                        Создайте или присоединитесь к игре
                    </div>
                `;
                document.getElementById('lobbyCode').textContent = '—';
                return;
            }
            
            const isCurrentPlayerInLobby = lobby.players.some(p => p.username === currentUser);
            if (!isCurrentPlayerInLobby) {
                console.log('Текущий игрок не найден в лобби, очищаем');
                container.innerHTML = `
                    <div class="no-lobby">
                        Вы не в лобби<br>
                        Создайте или присоединитесь к игре
                    </div>
                `;
                document.getElementById('lobbyCode').textContent = '—';
                currentLobby = null;
                return;
            }
            
            document.getElementById('lobbyCode').textContent = lobby.lobbyId;
            
            const isCreator = lobby.creator === currentUser;
            const canStart = lobby.playersCount === 3 && isCreator;
            
            container.innerHTML = `
                <div class="players-list">
                    <h3 style="color: #00ff96; margin-bottom: 10px;">Игроки (${lobby.playersCount}/${lobby.maxPlayers})</h3>
                    ${lobby.players.map(player => `
                        <div class="player-item">
                            <div>
                                <span class="player-name">${escapeHtml(player.username)}</span>
                                ${player.username === lobby.creator ? '<span class="player-role">(Создатель)</span>' : ''}
                                ${player.username === currentUser ? '<span class="player-role">(Вы)</span>' : ''}
                            </div>
                            ${isCreator && player.username !== currentUser ? 
                                `<button class="kick-btn" onclick="kickPlayer('${escapeHtml(player.username)}')">Кикнуть</button>` : 
                                ''
                            }
                        </div>
                    `).join('')}
                </div>
                
                ${lobby.playersCount < 3 ? 
                    `<div class="waiting-text">⏳ Ожидание игроков (нужно 3 человека, сейчас ${lobby.playersCount})</div>` : 
                    '<div class="waiting-text">✅ Все игроки собраны! Можно начинать!</div>'
                }
                
                <div class="lobby-actions">
                    ${isCreator ? 
                        `<button class="start-game-btn" onclick="startGame()" ${!canStart ? 'disabled' : ''}>
                            ${canStart ? '🎮 Начать игру' : '⏳ Ожидание игроков...'}
                        </button>` : 
                        ''
                    }
                    <button class="leave-lobby-btn" onclick="leaveLobby()">🚪 Покинуть лобби</button>
                </div>
            `;
        }
        
        function refreshLobbies() {
            if (socket && socket.connected) {
                socket.emit('getLobbies');
            }
        }
        
        function showCreateLobbyModal() {
            document.getElementById('createLobbyModal').classList.add('active');
        }
        
        function closeCreateLobbyModal() {
            document.getElementById('createLobbyModal').classList.remove('active');
            document.getElementById('lobbyName').value = '';
            document.getElementById('isPrivateCheckbox').checked = false;
            document.getElementById('lobbyPassword').style.display = 'none';
            document.getElementById('lobbyPassword').value = '';
        }
        
        function createLobby() {
            const lobbyName = document.getElementById('lobbyName').value.trim();
            const isPrivate = document.getElementById('isPrivateCheckbox').checked;
            const password = document.getElementById('lobbyPassword').value;
            
            if (!lobbyName) {
                alert('Введите название лобби');
                return;
            }
            
            if (allLobbies.some(l => l.name.toLowerCase() === lobbyName.toLowerCase())) {
                alert('Лобби с таким названием уже существует! Пожалуйста, выберите другое название.');
                return;
            }
            
            if (isPrivate && (!password || password.length < 3)) {
                alert('Для приватного лобби введите пароль (минимум 3 символа)');
                return;
            }
            
            socket.emit('createLobby', {
                username: currentUser,
                isPrivate: isPrivate,
                password: isPrivate ? password : null,
                lobbyName: lobbyName
            }, (response) => {
                if (response.success) {
                    currentLobby = response.lobby;
                    renderCurrentLobby(currentLobby);
                    closeCreateLobbyModal();
                } else {
                    alert('Ошибка создания лобби: ' + response.error);
                }
            });
        }
        
        function joinLobby(lobbyId) {
            if (currentLobby) {
                alert('Вы уже в лобби. Покиньте текущее лобби перед присоединением к новому.');
                return;
            }
            
            pendingLobbyId = lobbyId;
            socket.emit('joinLobby', {
                lobbyId: lobbyId,
                username: currentUser,
                password: null
            }, (response) => {
                if (response.success) {
                    currentLobby = response.lobby;
                    renderCurrentLobby(currentLobby);
                } else {
                    if (response.error === 'Неверный пароль') {
                        showJoinPrivateModal();
                    } else {
                        alert('Ошибка: ' + response.error);
                    }
                }
            });
        }
        
        function showJoinPrivateModal() {
            document.getElementById('joinPrivateModal').classList.add('active');
        }
        
        function closeJoinPrivateModal() {
            document.getElementById('joinPrivateModal').classList.remove('active');
            document.getElementById('privateLobbyPassword').value = '';
            pendingLobbyId = null;
        }
        
        function joinPrivateLobby() {
            const password = document.getElementById('privateLobbyPassword').value;
            
            if (!password) {
                alert('Введите пароль');
                return;
            }
            
            socket.emit('joinLobby', {
                lobbyId: pendingLobbyId,
                username: currentUser,
                password: password
            }, (response) => {
                closeJoinPrivateModal();
                if (!response.success) {
                    alert('Ошибка: ' + response.error);
                }
            });
        }
        
        function kickPlayer(username) {
            if (confirm(`Вы уверены, что хотите кикнуть игрока ${username}?`)) {
                socket.emit('kickPlayer', {
                    lobbyId: currentLobby?.lobbyId,
                    usernameToKick: username
                }, (response) => {
                    if (!response.success) {
                        alert('Ошибка: ' + response.error);
                    }
                });
            }
        }
        
        function leaveLobby() {
            if (!currentLobby) {
                alert('Вы не в лобби');
                return;
            }
            
            if (confirm('Покинуть лобби?')) {
                console.log('Отправка запроса на выход из лобби');
                socket.emit('leaveLobby', {}, (response) => {
                    console.log('Ответ на leaveLobby:', response);
                    if (response && !response.success) {
                        alert('Ошибка: ' + response.error);
                    } else {
                        currentLobby = null;
                        renderCurrentLobby(null);
                        refreshLobbies();
                    }
                });
            }
        }
        
        function startGame() {
            if (!currentLobby) {
                alert('Вы не в лобби');
                return;
            }
            
            if (currentLobby.playersCount !== 3) {
                alert(`Нужно 3 игрока (сейчас ${currentLobby.playersCount})`);
                return;
            }
            
            if (currentLobby.creator !== currentUser) {
                alert('Только создатель может начать игру');
                return;
            }
            
            socket.emit('startGame', {}, (response) => {
                if (!response.success) {
                    alert('Ошибка: ' + response.error);
                }
            });
        }
        
        function showLeaderboard() {
            window.location.href = '/leaderboard.html';
        }
        
        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                if (socket) socket.disconnect();
                if (refreshInterval) clearInterval(refreshInterval);
                window.location.href = '/';
            } catch (error) {
                console.error('Ошибка выхода:', error);
                window.location.href = '/';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('isPrivateCheckbox').addEventListener('change', (e) => {
            const passwordInput = document.getElementById('lobbyPassword');
            passwordInput.style.display = e.target.checked ? 'block' : 'none';
        });
        
        init();
    </script>
</body>
</html>
