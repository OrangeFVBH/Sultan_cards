<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дурак 36 карт - Игра</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        /* Исправленная структура body */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a2f23;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .game-header {
            height: 60px;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0,255,150,0.2);
            flex-shrink: 0; /* Чтобы шапка не сжималась */
        }
        
        .trump-indicator {
            background: rgba(0,255,150,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            color: #00ff96;
            font-weight: bold;
            border: 1px solid rgba(0,255,150,0.3);
        }
        
        .exit-btn {
            background: rgba(255,50,50,0.3);
            color: white;
            border: 1px solid rgba(255,50,50,0.5);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .exit-btn:hover {
            background: rgba(255,0,0,0.6);
        }
        
        @media (max-width: 768px) {
            .game-header {
                height: 50px;
                padding: 0 10px;
            }
            .trump-indicator {
                padding: 4px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <div class="trump-indicator">♢ КОЗЫРЬ: БУБНЫ ♢</div>
        <button class="exit-btn" onclick="exitGame()">🚪 Выход</button>
    </div>
    
    <div id="gameContainer">
        <div id="statusBar" class="status">Ваш ход</div>

        <div class="square-field">
            <div class="player-zone top" id="playerTop"></div>
            <div class="player-zone left" id="playerLeft"></div>
            
            <div class="table-zone" id="tableZone"></div>
            
            <div class="player-zone right" id="playerRight"></div>
            
            <div class="player-zone my-zone" id="myZone">
                <div class="my-label">🎴 ВАШИ КАРТЫ</div>
                <div id="myHand" class="hand"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/gameUI.js"></script>
    
    <script>
        function exitGame() {
            if (confirm('Выйти из игры? Вы будете считаться проигравшим.')) {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
