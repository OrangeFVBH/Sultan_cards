<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sultan Cards</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="minimal-exit" onclick="exitGame()" title="Выйти">✕</button>

    <div id="gameContainer">
        <div id="statusBar" class="status-toast">Ожидание...</div>

        <div class="game-board">
            <div class="player-badge player-top" id="playerTop">
                <div class="badge-info">
                    <div class="p-name">Оппонент 1</div>
                    <div class="p-cards">🎴 <span>12</span></div>
                </div>
            </div>
            
            <div class="player-badge player-left" id="playerLeft">
                <div class="badge-info">
                    <div class="p-name">Оппонент 2</div>
                    <div class="p-cards">🎴 <span>12</span></div>
                </div>
            </div>
            
            <div class="main-table" id="tableZone">
                <div class="table-pairs" id="tablePairs">
                    </div>
            </div>
            
            <div class="my-area">
                <div id="myHand" class="hand"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/gameUI.js"></script>
    <script>
        function exitGame() {
            if (confirm('Выйти из игры?')) window.location.href = '/';
        }
    </script>
</body>
</html>
